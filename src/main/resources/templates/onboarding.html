<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack — Setup</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07);
            --accent: #7c6fe0;
            --accent2: #e06fa0;
            --accent3: #6fe0c8;
            --green: #4ade80;
            --text: #f0f0ff;
            --text2: #9999bb;
            --error: #f87171;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            color: var(--text);
            position: relative;
            overflow: hidden;
        }

        /* animated background orbs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            pointer-events: none;
        }
        body::before {
            width: 500px; height: 500px;
            background: var(--accent);
            top: -120px; left: -120px;
            animation: drift 12s ease-in-out infinite alternate;
        }
        body::after {
            width: 400px; height: 400px;
            background: var(--accent2);
            bottom: -100px; right: -80px;
            animation: drift 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            from { transform: translate(0, 0); }
            to   { transform: translate(40px, 30px); }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,111,224,0.08);
        }

        /* Header */
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-text {
            font-size: 1.25rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .tagline {
            color: var(--text2);
            font-size: 0.9rem;
            margin-bottom: 36px;
        }

        /* Step indicator */
        .steps {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 36px;
        }
        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
        }
        .step-dot {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--surface2);
            border: 2px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text2);
            transition: all 0.35s ease;
            position: relative;
            z-index: 1;
        }
        .step-item.active .step-dot {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-color: transparent;
            color: white;
            box-shadow: 0 0 16px rgba(124,111,224,0.5);
        }
        .step-item.done .step-dot {
            background: var(--accent);
            border-color: transparent;
            color: white;
        }
        .step-lbl {
            font-size: 0.72rem;
            color: var(--text2);
            font-weight: 500;
            white-space: nowrap;
        }
        .step-item.active .step-lbl { color: var(--accent); font-weight: 600; }

        .step-connector {
            flex: 1;
            height: 2px;
            background: var(--border);
            margin-bottom: 22px;
            transition: background 0.35s;
        }
        .step-connector.done { background: var(--accent); }

        /* Form sections */
        .section { display: none; }
        .section.active {
            display: block;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }
        .section-sub {
            font-size: 0.85rem;
            color: var(--text2);
            margin-bottom: 28px;
        }

        /* Form controls */
        .field { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 13px 16px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(124,111,224,0.15);
        }
        input::placeholder { color: var(--text2); opacity: 0.6; }
        select option { background: var(--surface2); }

        /* Radio pills */
        .radio-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .radio-pill input[type="radio"] { display: none; }
        .radio-pill label {
            display: block;
            padding: 10px 18px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--text2);
            text-transform: none;
            letter-spacing: 0;
            margin: 0;
            transition: all 0.2s;
        }
        .radio-pill input[type="radio"]:checked + label {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-color: transparent;
            color: white;
            box-shadow: 0 4px 12px rgba(124,111,224,0.35);
        }
        .radio-pill label:hover { border-color: var(--accent); color: var(--text); }

        /* Error */
        .err {
            color: var(--error);
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
        .err.show { display: block; }
        .field-error { border-color: var(--error) !important; }

        /* Buttons */
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }
        .btn {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
        }
        .btn-ghost {
            background: var(--surface2);
            color: var(--text2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover { background: var(--border); color: var(--text); }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            box-shadow: 0 4px 16px rgba(124,111,224,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,111,224,0.45); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        /* Result step */
        .result-hero {
            background: linear-gradient(135deg, rgba(124,111,224,0.15), rgba(224,111,160,0.1));
            border: 1px solid rgba(124,111,224,0.25);
            border-radius: 18px;
            padding: 28px;
            text-align: center;
            margin-bottom: 20px;
        }
        .result-hero-label { font-size: 0.82rem; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
        .result-big {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 6px;
        }
        .result-unit { font-size: 0.9rem; color: var(--text2); }

        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
        }
        .stat-val {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent3);
            margin-bottom: 4px;
        }
        .stat-lbl { font-size: 0.78rem; color: var(--text2); }

        .summary-list { margin-bottom: 8px; }
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.88rem;
        }
        .summary-row:last-child { border-bottom: none; }
        .summary-row .k { color: var(--text2); }
        .summary-row .v { color: var(--accent); font-weight: 600; }

        .goal-note {
            font-size: 0.82rem;
            color: var(--text2);
            text-align: center;
            line-height: 1.6;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">HealthTrack</span>
        </div>
        <p class="tagline">Let's build your personalized plan</p>

        <!-- Step indicators -->
        <div class="steps">
            <div class="step-item active" id="si1">
                <div class="step-dot">1</div>
                <div class="step-lbl">Profile</div>
            </div>
            <div class="step-connector" id="conn1"></div>
            <div class="step-item" id="si2">
                <div class="step-dot">2</div>
                <div class="step-lbl">Goals</div>
            </div>
            <div class="step-connector" id="conn2"></div>
            <div class="step-item" id="si3">
                <div class="step-dot">3</div>
                <div class="step-lbl">Your Plan</div>
            </div>
        </div>

        <!-- Step 1 -->
        <div class="section active" id="sec1">
            <div class="section-title">Tell us about yourself</div>
            <div class="section-sub">Basic info to calculate your metabolism accurately</div>

            <div class="field">
                <label>Age (years)</label>
                <input type="number" id="age" min="15" max="120" placeholder="e.g. 25">
                <div class="err" id="ageErr"></div>
            </div>
            <div class="field">
                <label>Weight (kg)</label>
                <input type="number" id="weight" min="20" max="300" step="0.1" placeholder="e.g. 70">
                <div class="err" id="weightErr"></div>
            </div>
            <div class="field">
                <label>Height (cm)</label>
                <input type="number" id="height" min="100" max="250" placeholder="e.g. 175">
                <div class="err" id="heightErr"></div>
            </div>
            <div class="field">
                <label>Gender</label>
                <div class="radio-row">
                    <div class="radio-pill">
                        <input type="radio" id="male" name="gender" value="male" checked>
                        <label for="male">Male</label>
                    </div>
                    <div class="radio-pill">
                        <input type="radio" id="female" name="gender" value="female">
                        <label for="female">Female</label>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-primary" onclick="goTo(2)">Continue →</button>
            </div>
        </div>

        <!-- Step 2 -->
        <div class="section" id="sec2">
            <div class="section-title">Activity & Goal</div>
            <div class="section-sub">How active are you, and what do you want to achieve?</div>

            <div class="field">
                <label>Activity Level</label>
                <select id="activityLevel">
                    <option value="sedentary">Sedentary — little or no exercise</option>
                    <option value="light">Lightly Active — 1-3 days/week</option>
                    <option value="moderate" selected>Moderately Active — 3-5 days/week</option>
                    <option value="very">Very Active — 6-7 days/week</option>
                    <option value="extreme">Extremely Active — physical job</option>
                </select>
            </div>

            <div class="field">
                <label>Weight Goal</label>
                <div class="radio-row">
                    <div class="radio-pill">
                        <input type="radio" id="lose" name="goal" value="lose" checked>
                        <label for="lose">Lose Weight</label>
                    </div>
                    <div class="radio-pill">
                        <input type="radio" id="maintain" name="goal" value="maintain">
                        <label for="maintain">Maintain</label>
                    </div>
                    <div class="radio-pill">
                        <input type="radio" id="gain" name="goal" value="gain">
                        <label for="gain">Gain Weight</label>
                    </div>
                </div>
            </div>

            <div class="btn-row">
                <button class="btn btn-ghost" onclick="goTo(1)">← Back</button>
                <button class="btn btn-primary" onclick="calcAndShow()">Calculate Plan</button>
            </div>
        </div>

        <!-- Step 3 -->
        <div class="section" id="sec3">
            <div id="resultContent"></div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="goTo(2)">← Back</button>
                <button class="btn btn-primary" onclick="window.location.href='/'">Go to Dashboard →</button>
            </div>
        </div>
    </div>

    <script>
        let cur = 1;

        function goTo(step) {
            if (step > cur && !validate(cur)) return;
            cur = step;
            render();
        }

        function render() {
            document.querySelectorAll('.section').forEach((s, i) => {
                s.classList.toggle('active', i + 1 === cur);
            });
            [1, 2, 3].forEach(n => {
                const si = document.getElementById('si' + n);
                si.classList.toggle('active', n === cur);
                si.classList.toggle('done', n < cur);
            });
            [1, 2].forEach(n => {
                const c = document.getElementById('conn' + n);
                c.classList.toggle('done', n < cur);
            });
        }

        function validate(step) {
            let ok = true;
            if (step === 1) {
                const checks = [
                    { id: 'age',    min: 15,  max: 120, msg: 'Valid age: 15–120' },
                    { id: 'weight', min: 20,  max: 300, msg: 'Valid weight: 20–300 kg' },
                    { id: 'height', min: 100, max: 250, msg: 'Valid height: 100–250 cm' },
                ];
                checks.forEach(({ id, min, max, msg }) => {
                    const val = parseFloat(document.getElementById(id).value);
                    const err = document.getElementById(id + 'Err');
                    const inp = document.getElementById(id);
                    if (!val || val < min || val > max) {
                        err.textContent = msg;
                        err.classList.add('show');
                        inp.classList.add('field-error');
                        ok = false;
                    } else {
                        err.classList.remove('show');
                        inp.classList.remove('field-error');
                    }
                });
            }
            return ok;
        }

        function calcAndShow() {
            const body = {
                age: parseInt(document.getElementById('age').value),
                weight: parseFloat(document.getElementById('weight').value),
                height: parseFloat(document.getElementById('height').value),
                gender: document.querySelector('input[name="gender"]:checked').value,
                activityLevel: document.getElementById('activityLevel').value,
                goal: document.querySelector('input[name="goal"]:checked').value,
            };

            fetch('/api/calculate-calories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) { alert('Error: ' + data.error); return; }
                localStorage.setItem('userProfile', JSON.stringify(body));
                localStorage.setItem('calorieTarget', JSON.stringify(data));
                showResult(body, data);
                goTo(3);
            })
            .catch(() => alert('Failed to calculate. Please try again.'));
        }

        function showResult(p, t) {
            const goalLabel = { lose: '💪 Weight Loss', gain: '🍔 Weight Gain', maintain: '⚖️ Maintenance' }[p.goal];
            const actMap = { sedentary: 'Sedentary', light: 'Lightly Active', moderate: 'Moderately Active', very: 'Very Active', extreme: 'Extremely Active' };
            const deficit = t.dailyCalories - t.targetCalories;
            const surplus = t.targetCalories - t.dailyCalories;
            let note = '';
            if (p.goal === 'lose') note = `A ${Math.round(deficit)} kcal/day deficit → ~${(deficit * 7 / 7700).toFixed(2)} kg/week loss`;
            else if (p.goal === 'gain') note = `A ${Math.round(surplus)} kcal/day surplus → ~${(surplus * 7 / 7700).toFixed(2)} kg/week gain`;
            else note = `Eating ${t.targetCalories} kcal/day keeps your current weight stable`;

            document.getElementById('resultContent').innerHTML = `
                <div class="section-title">Your Plan is Ready 🎯</div>
                <div class="section-sub" style="margin-bottom:20px">${t.description || ''}</div>

                <div class="result-hero">
                    <div class="result-hero-label">Daily Calorie Target</div>
                    <div class="result-big">${t.targetCalories}</div>
                    <div class="result-unit">kcal / day</div>
                </div>

                <div class="result-stats">
                    <div class="stat-card">
                        <div class="stat-val">${t.basalMetabolicRate}</div>
                        <div class="stat-lbl">BMR at rest</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-val">${t.dailyCalories}</div>
                        <div class="stat-lbl">TDEE with activity</div>
                    </div>
                </div>

                <div class="summary-list">
                    <div class="summary-row"><span class="k">Age</span><span class="v">${p.age} yrs</span></div>
                    <div class="summary-row"><span class="k">Weight</span><span class="v">${p.weight} kg</span></div>
                    <div class="summary-row"><span class="k">Height</span><span class="v">${p.height} cm</span></div>
                    <div class="summary-row"><span class="k">Activity</span><span class="v">${actMap[p.activityLevel]}</span></div>
                    <div class="summary-row"><span class="k">Goal</span><span class="v">${goalLabel}</span></div>
                </div>

                <p class="goal-note">${note}</p>
            `;
        }

        window.addEventListener('load', () => {
            if (localStorage.getItem('userProfile')) window.location.href = '/';
        });
    </script>
</body>
</html>
