<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack - Setup Your Profile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .onboarding-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
        }

        .onboarding-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .onboarding-header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 10px;
        }

        .onboarding-header p {
            color: #888;
            font-size: 1.05em;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 1em;
        }

        input[type="number"],
        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        input[type="number"]:focus,
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 12px;
        }

        .radio-option {
            flex: 1;
        }

        .radio-option input[type="radio"] {
            display: none;
        }

        .radio-option label {
            display: block;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 0;
            font-weight: 500;
            background: white;
        }

        .radio-option input[type="radio"]:checked + label {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 40px;
        }

        button {
            flex: 1;
            padding: 13px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .step {
            text-align: center;
            flex: 1;
        }

        .step-number {
            width: 35px;
            height: 35px;
            background: #e0e0e0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: #888;
            margin: 0 auto 8px;
            font-size: 0.9em;
        }

        .step.active .step-number {
            background: #667eea;
            color: white;
        }

        .step-label {
            font-size: 0.85em;
            color: #888;
        }

        .step.active .step-label {
            color: #667eea;
            font-weight: 600;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            color: #e53935;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .input-error {
            border-color: #e53935 !important;
        }

        .summary {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            font-size: 0.95em;
        }

        .summary-item:last-child {
            border-bottom: none;
        }

        .summary-item .label {
            color: #666;
            font-weight: 500;
        }

        .summary-item .value {
            color: #667eea;
            font-weight: 600;
        }

        .result-section {
            display: none;
        }

        .result-section.active {
            display: block;
        }

        .calories-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            text-align: center;
        }

        .calorie-value {
            font-size: 3em;
            font-weight: bold;
            margin: 15px 0;
        }

        .calorie-label {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .calorie-details {
            margin-top: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .calorie-detail {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .calorie-detail-value {
            font-size: 1.8em;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .calorie-detail-label {
            font-size: 0.9em;
            color: #666;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="onboarding-container">
        <div class="onboarding-header">
            <h1>🏥 HealthTrack</h1>
            <p>Let's set up your personalized calorie plan</p>
        </div>

        <div class="step-indicator">
            <div class="step active" id="step1">
                <div class="step-number">1</div>
                <div class="step-label">Personal Info</div>
            </div>
            <div class="step" id="step2">
                <div class="step-number">2</div>
                <div class="step-label">Activity & Goal</div>
            </div>
            <div class="step" id="step3">
                <div class="step-number">3</div>
                <div class="step-label">Your Plan</div>
            </div>
        </div>

        <form id="onboardingForm">
            <!-- STEP 1: Personal Info -->
            <div class="form-section active" id="section1">
                <div class="form-group">
                    <label for="age">Age (years)</label>
                    <input type="number" id="age" name="age" min="15" max="120" placeholder="e.g., 25" required>
                    <div class="error-message" id="ageError"></div>
                </div>

                <div class="form-group">
                    <label for="weight">Weight (kg)</label>
                    <input type="number" id="weight" name="weight" min="20" max="300" step="0.1" placeholder="e.g., 70" required>
                    <div class="error-message" id="weightError"></div>
                </div>

                <div class="form-group">
                    <label for="height">Height (cm)</label>
                    <input type="number" id="height" name="height" min="100" max="250" placeholder="e.g., 175" required>
                    <div class="error-message" id="heightError"></div>
                </div>

                <div class="form-group">
                    <label>Gender</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="male" name="gender" value="male" checked>
                            <label for="male">Male</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Female</label>
                        </div>
                    </div>
                </div>

                <button type="button" class="btn-primary" onclick="goToStep(2)">Next</button>
            </div>

            <!-- STEP 2: Activity & Goal -->
            <div class="form-section" id="section2">
                <div class="form-group">
                    <label for="activityLevel">Activity Level</label>
                    <select id="activityLevel" name="activityLevel" required>
                        <option value="sedentary">Sedentary (little or no exercise)</option>
                        <option value="light">Lightly Active (1-3 days/week)</option>
                        <option value="moderate" selected>Moderately Active (3-5 days/week)</option>
                        <option value="very">Very Active (6-7 days/week)</option>
                        <option value="extreme">Extremely Active (physical job)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Weight Goal</label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input type="radio" id="lose" name="goal" value="lose" checked>
                            <label for="lose">Lose Weight</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="maintain" name="goal" value="maintain">
                            <label for="maintain">Maintain</label>
                        </div>
                        <div class="radio-option">
                            <input type="radio" id="gain" name="goal" value="gain">
                            <label for="gain">Gain Weight</label>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn-secondary" onclick="goToStep(1)">Back</button>
                    <button type="button" class="btn-primary" onclick="calculateAndShowResult()">Calculate</button>
                </div>
            </div>

            <!-- STEP 3: Results -->
            <div class="form-section" id="section3">
                <div id="resultContent"></div>
                <div class="button-group">
                    <button type="button" class="btn-secondary" onclick="goToStep(2)">Back</button>
                    <button type="button" class="btn-primary" onclick="goToDashboard()">Go to Dashboard</button>
                </div>
            </div>
        </form>
    </div>

    <script>
        let currentStep = 1;

        function goToStep(step) {
            if (step > currentStep && !validateStep(currentStep)) {
                return;
            }

            currentStep = step;
            updateUI();
        }

        function updateUI() {
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.getElementById('section' + currentStep).classList.add('active');

            document.querySelectorAll('.step').forEach((step, index) => {
                step.classList.remove('active');
                if (index + 1 <= currentStep) {
                    step.classList.add('active');
                }
            });
        }

        function validateStep(step) {
            const errors = {};
            let isValid = true;

            if (step === 1) {
                const age = parseInt(document.getElementById('age').value);
                const weight = parseFloat(document.getElementById('weight').value);
                const height = parseFloat(document.getElementById('height').value);

                if (!age || age < 15 || age > 120) {
                    errors.age = 'Please enter a valid age (15-120)';
                    isValid = false;
                }

                if (!weight || weight < 20 || weight > 300) {
                    errors.weight = 'Please enter a valid weight (20-300 kg)';
                    isValid = false;
                }

                if (!height || height < 100 || height > 250) {
                    errors.height = 'Please enter a valid height (100-250 cm)';
                    isValid = false;
                }

                ['age', 'weight', 'height'].forEach(field => {
                    const errorEl = document.getElementById(field + 'Error');
                    if (errors[field]) {
                        errorEl.textContent = errors[field];
                        errorEl.classList.add('show');
                        document.getElementById(field).classList.add('input-error');
                    } else {
                        errorEl.classList.remove('show');
                        document.getElementById(field).classList.remove('input-error');
                    }
                });
            }

            return isValid;
        }

        function calculateAndShowResult() {
            if (!validateStep(currentStep - 1)) {
                return;
            }

            const formData = {
                age: parseInt(document.getElementById('age').value),
                weight: parseFloat(document.getElementById('weight').value),
                height: parseFloat(document.getElementById('height').value),
                gender: document.querySelector('input[name="gender"]:checked').value,
                activityLevel: document.getElementById('activityLevel').value,
                goal: document.querySelector('input[name="goal"]:checked').value
            };

            fetch('/api/calculate-calories', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    alert('Error: ' + data.error);
                    return;
                }

                localStorage.setItem('userProfile', JSON.stringify(formData));
                localStorage.setItem('calorieTarget', JSON.stringify(data));

                displayResults(formData, data);
                goToStep(3);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Failed to calculate calories');
            });
        }

        function displayResults(profile, target) {
            const goalText = {
                'lose': '💪 Weight Loss',
                'gain': '🍔 Weight Gain',
                'maintain': '⚖️ Maintenance'
            }[profile.goal] || profile.goal;

            const resultHTML = `
                <div class="summary" style="margin-bottom: 30px;">
                    <div class="summary-item">
                        <span class="label">Age</span>
                        <span class="value">${profile.age} years</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">Weight</span>
                        <span class="value">${profile.weight} kg</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">Activity Level</span>
                        <span class="value">${capitalizeFirst(profile.activityLevel)}</span>
                    </div>
                    <div class="summary-item">
                        <span class="label">Goal</span>
                        <span class="value">${goalText}</span>
                    </div>
                </div>

                <div class="calories-display">
                    <div class="calorie-label">Your Daily Calorie Target</div>
                    <div class="calorie-value">${target.targetCalories}</div>
                    <div class="calorie-label">${target.description}</div>
                </div>

                <div class="calorie-details">
                    <div class="calorie-detail">
                        <div class="calorie-detail-label">Basal Metabolic Rate</div>
                        <div class="calorie-detail-value">${target.basalMetabolicRate}</div>
                        <div style="font-size: 0.8em; color: #999;">kcal/day at rest</div>
                    </div>
                    <div class="calorie-detail">
                        <div class="calorie-detail-label">Daily Expenditure</div>
                        <div class="calorie-detail-value">${target.dailyCalories}</div>
                        <div style="font-size: 0.8em; color: #999;">with your activity</div>
                    </div>
                </div>

                <p style="margin-top: 20px; text-align: center; color: #666; font-size: 0.9em;">
                    ${getGoalExplanation(profile.goal, target)}
                </p>
            `;

            document.getElementById('resultContent').innerHTML = resultHTML;
        }

        function getGoalExplanation(goal, target) {
            const deficit = target.dailyCalories - target.targetCalories;
            const surplus = target.targetCalories - target.dailyCalories;

            if (goal === 'lose') {
                const weeklyLoss = (deficit * 7 / 7700).toFixed(2);
                return `A deficit of ${Math.round(deficit)} calories/day will help you lose approximately ${weeklyLoss} kg per week.`;
            } else if (goal === 'gain') {
                const weeklyGain = (surplus * 7 / 7700).toFixed(2);
                return `A surplus of ${Math.round(surplus)} calories/day will help you gain approximately ${weeklyGain} kg per week.`;
            } else {
                return `You will maintain your current weight at ${target.targetCalories} calories per day.`;
            }
        }

        function capitalizeFirst(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        function goToDashboard() {
            window.location.href = '/';
        }

        window.addEventListener('load', () => {
            const savedProfile = localStorage.getItem('userProfile');
            if (savedProfile) {
                goToDashboard();
            }
        });
    </script>
</body>
</html>
