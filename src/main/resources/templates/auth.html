<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthTrack — Sign In</title>
    <style>
        :root {
            --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
            --border: rgba(255,255,255,0.07); --accent: #7c6fe0; --accent2: #e06fa0;
            --text: #f0f0ff; --text2: #9999bb; --error: #f87171; --green: #4ade80;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg); min-height: 100vh; display: flex;
            justify-content: center; align-items: center; padding: 24px;
            color: var(--text); overflow: hidden;
        }
        .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.18; pointer-events: none; z-index: 0; }
        .orb1 { width: 500px; height: 500px; background: var(--accent); top: -120px; left: -120px; animation: drift 12s ease-in-out infinite alternate; }
        .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; animation: drift 15s ease-in-out infinite alternate-reverse; }
        @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

        .card {
            background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
            padding: 48px 40px; width: 100%; max-width: 420px; position: relative; z-index: 1;
            box-shadow: 0 32px 64px rgba(0,0,0,0.6), 0 0 0 1px rgba(124,111,224,0.08);
        }
        .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .logo-text { font-size: 1.25rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .tagline { color: var(--text2); font-size: 0.88rem; margin-bottom: 32px; }

        .tabs { display: flex; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
        .tab { flex: 1; padding: 10px; text-align: center; border-radius: 9px; cursor: pointer; font-size: 0.9rem; font-weight: 600; color: var(--text2); transition: all 0.2s; }
        .tab.active { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 12px rgba(124,111,224,0.3); }

        .form { display: none; }
        .form.active { display: block; animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        .field { margin-bottom: 18px; }
        label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 7px; }
        input { width: 100%; padding: 13px 16px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,111,224,0.15); }
        input::placeholder { color: var(--text2); opacity: 0.6; }

        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 0.95rem; font-weight: 700; cursor: pointer; font-family: inherit; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 16px rgba(124,111,224,0.3); transition: all 0.25s; margin-top: 8px; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(124,111,224,0.45); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); border-radius: 10px; padding: 12px 14px; color: var(--error); font-size: 0.85rem; margin-bottom: 16px; display: none; }
        .error-msg.show { display: block; }
        .success-msg { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); border-radius: 10px; padding: 12px 14px; color: var(--green); font-size: 0.85rem; margin-bottom: 16px; display: none; }
        .success-msg.show { display: block; }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">⚡</div>
            <span class="logo-text">HealthTrack</span>
        </div>
        <p class="tagline">Your AI-powered health companion</p>

        <div class="tabs">
            <div class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
            <div class="tab" id="tabRegister" onclick="switchTab('register')">Create Account</div>
        </div>

        <!-- Login -->
        <div class="form active" id="formLogin">
            <div class="error-msg" id="loginError"></div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Your password" onkeydown="if(event.key==='Enter') login()">
            </div>
            <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>
        </div>

        <!-- Register -->
        <div class="form" id="formRegister">
            <div class="error-msg" id="registerError"></div>
            <div class="success-msg" id="registerSuccess"></div>
            <div class="field">
                <label>Your Name</label>
                <input type="text" id="registerName" placeholder="e.g. Rahul">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="registerEmail" placeholder="you@example.com">
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" id="registerPassword" placeholder="Min. 6 characters" onkeydown="if(event.key==='Enter') register()">
            </div>
            <button class="btn" id="registerBtn" onclick="register()">Create Account →</button>
        </div>
    </div>

    <script>
        // Redirect if already logged in
        if (localStorage.getItem('authToken')) window.location.href = '/';

        function switchTab(tab) {
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('formLogin').classList.toggle('active', tab === 'login');
            document.getElementById('formRegister').classList.toggle('active', tab === 'register');
        }

        function showError(id, msg) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.classList.add('show');
        }
        function hideError(id) { document.getElementById(id).classList.remove('show'); }

        async function login() {
            hideError('loginError');
            const email    = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            if (!email || !password) { showError('loginError', 'Please enter email and password'); return; }

            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.textContent = 'Signing in...';
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('currentUser', JSON.stringify({ email: data.email, name: data.name, userId: data.userId }));
                    window.location.href = '/';
                } else {
                    showError('loginError', 'Invalid email or password');
                    btn.disabled = false; btn.textContent = 'Sign In →';
                }
            } catch(e) {
                showError('loginError', 'Connection error. Please try again.');
                btn.disabled = false; btn.textContent = 'Sign In →';
            }
        }

        async function register() {
            hideError('registerError');
            document.getElementById('registerSuccess').classList.remove('show');
            const name     = document.getElementById('registerName').value.trim();
            const email    = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value;
            if (!name)     { showError('registerError', 'Please enter your name'); return; }
            if (!email)    { showError('registerError', 'Please enter your email'); return; }
            if (password.length < 6) { showError('registerError', 'Password must be at least 6 characters'); return; }

            const btn = document.getElementById('registerBtn');
            btn.disabled = true; btn.textContent = 'Creating account...';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('currentUser', JSON.stringify({ email: data.email, name: data.name, userId: data.userId }));
                    window.location.href = '/onboarding';
                } else {
                    showError('registerError', data.error || 'Registration failed');
                    btn.disabled = false; btn.textContent = 'Create Account →';
                }
            } catch(e) {
                showError('registerError', 'Connection error. Please try again.');
                btn.disabled = false; btn.textContent = 'Create Account →';
            }
        }
    </script>
</body>
</html>
